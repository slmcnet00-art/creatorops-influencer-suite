services:
  - type: web
    name: creatorops-influencer-suite
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: VITE_CREATOROPS_API_BASE_URL
        fromService:
          type: web
          name: creatorops-suite-api
          envVarKey: RENDER_EXTERNAL_URL
  - type: web
    name: creatorops-suite-api
    runtime: node
    buildCommand: npm install
    startCommand: npm run api:dev
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: CORS_ORIGIN
        value: https://creatorops-influencer-suite.onrender.com,http://localhost:5173
      - key: FRONTEND_URL
        value: https://creatorops-influencer-suite.onrender.com
      - key: YOUTUBE_DATA_API_KEY
        sync: false
      - key: GOOGLE_SEARCH_API_KEY
        sync: false
      - key: GOOGLE_SEARCH_CX
        sync: false
      - key: BRAVE_SEARCH_API_KEY
        sync: false
      - key: TIKTOK_CLIENT_KEY
        sync: false
      - key: TIKTOK_CLIENT_SECRET
        sync: false
      - key: TIKTOK_COMMERCIAL_ACCESS_TOKEN
        sync: false
      - key: TIKTOK_COMMERCIAL_DATE_WINDOW_DAYS
        value: 365
      - key: PUBLIC_SNAPSHOT_ENABLED
        value: true
      - key: PUBLIC_SNAPSHOT_TIMEOUT_MS
        value: 8000
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4.1-mini
      - key: GMAIL_CLIENT_ID
        sync: false
      - key: GMAIL_CLIENT_SECRET
        sync: false
      - key: GOOGLE_OAUTH_REDIRECT_URI
        sync: false
      - key: CRON_SECRET
        sync: false
